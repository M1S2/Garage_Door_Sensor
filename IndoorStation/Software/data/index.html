<!DOCTYPE HTML>
<html>
	<head>
		<title>Garagen Tor Status</title>
		<meta content="text/html; charset=UTF-8" http-equiv="content-type">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- https://fonts.google.com/icons -->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />		
		<link rel="stylesheet" type="text/css" href="style.css">
	</head>
	<body onload="bodyLoaded()">
		<div id="Heading">
			<div>Garagen Tor Status</div>
			<div id="SubHeading">Übersicht</div>
		</div>
		
		<nav role="navigation">
			<a href="/index.html" class="active"><i class="material-symbols-outlined">info</i> Übersicht</a>
			<a href="/system_management.html"><i class="material-symbols-outlined">settings</i> System Verwaltung</a>
			<a href="/sensor_history.html"><i class="material-symbols-outlined">monitoring</i> Sensor Diagramme</a>
		</nav>
		
		<div class="content">
			<div class="cards">
				<!----------------------- SENSOR CARD TEMPLATE --------------------------------------------------------------------------------------->
				<template id="sensor-card-template">
					<div class="card sensorX">
						<h2 id="sensor_X_title"></h2>
						<h3 id="sensor_X_name"></h3>
						<h4 id="sensor_X_status_subTitle"><i class="material-symbols-outlined">door_open</i> STATUS</h4>
						<p class="reading" id="sensor_X_status"></p>
						<h4 id="sensor_X_battery_subTitle"><i class="material-symbols-outlined">battery_horiz_050</i> BATTERIE</h4>
						<p class="reading" id="sensor_X_percentage"></p>
						<p class="reading" id="sensor_X_voltage"></p>
						<br>
						<p class="timestamp" id="sensor_X_timestamp"></p>
						<br>
						<div class="error" id="sensor_X_error">
							<p id="sensor_X_mac" hidden></p>
							<p><i class="material-symbols-outlined">warning</i> MAC Adresse noch nicht gesetzt!</p>
							<p><a href="/system_management.html"><i class="material-symbols-outlined">settings</i> Jetzt konfigurieren</a></p>
						</div>
						<br>
					</div>
				</template>
			</div>
		</div>
	</body>
	<script src="utils.js"></script>
	<script src="index.js"></script>
</html>
