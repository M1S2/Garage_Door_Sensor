<!DOCTYPE HTML>
<html>
	<head>
		<title>Garagen Tor Status Diagramme</title>
		<meta content="text/html; charset=UTF-8" http-equiv="content-type">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- https://fonts.google.com/icons -->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
		<link rel="stylesheet" type="text/css" href="style.css">
		<script src="https://cdn.jsdelivr.net/npm/highcharts@11/highstock.js"></script>
	</head>
	<body onload="bodyLoaded()">
		<div id="Heading">
			<div>Garagen Tor Status</div>
			<div id="SubHeading">Sensor Diagramme</div>
		</div>
		
		<nav role="navigation">
			<a href="/index.html"><i class="material-symbols-outlined">info</i> Übersicht</a>
			<a href="/system_management.html"><i class="material-symbols-outlined">settings</i> System Verwaltung</a>
			<a href="/sensor_history.html" class="active"><i class="material-symbols-outlined">monitoring</i> Sensor Diagramme</a>
		</nav>
		
		<div class="content">
			<div class="range-options">
				<label><input type="radio" class="radio" name="date-range" value="all" checked> Kompletter Zeitraum</label>
				<label><input type="radio" class="radio" name="date-range" value="12m"> Letztes Jahr</label>
				<label><input type="radio" class="radio" name="date-range" value="6m"> Letzte 6 Monate</label>
				<label><input type="radio" class="radio" name="date-range" value="3m"> Letzte 3 Monate</label>
				<label><input type="radio" class="radio" name="date-range" value="1m"> Letzter Monat</label>
				<label><input type="radio" class="radio" name="date-range" value="custom"> Eigener Zeitraum</label>
			</div>
			
			<div id="date-controls">
				<div class="content-horizontal">
					<div>Von:</div>
					<input type="datetime-local" id="date-from">
				</div>
				<div class="content-horizontal">
					<div>Bis:</div>
					<input type="datetime-local" id="date-to">
				</div>
				<div id="day-count"></div>
			</div>
			<button class="submit_button load_data_button" onclick="loadData()">Daten laden</button>

			<div id="chart-accu" class="container"></div>
			<br>
			<br>
			<div id="chart-pinState" class="container"></div>
		</div>
	</body>
	<script src="sensor_history.js"></script>
</html>
