<!DOCTYPE HTML>
<html>
	<head>
		<title>Garagen Tor Status System Verwaltung</title>
		<meta content="text/html; charset=UTF-8" http-equiv="content-type">
		<meta name="viewport" content="width=device-width, initial-scale=1">
		<!-- https://fonts.google.com/icons -->
		<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" />
		<link rel="stylesheet" type="text/css" href="style.css">
	</head>
	<body onload="bodyLoaded()">
		<div id="Heading">
			<div>Garagen Tor Status</div>
			<div id="SubHeading">System Verwaltung</div>
		</div>
		
		<nav role="navigation">
			<a href="/index.html"><i class="material-symbols-outlined">info</i> Übersicht</a>
			<a href="/system_management.html" class="active"><i class="material-symbols-outlined">settings</i> System Verwaltung</a>
			<a href="/sensor_history.html"><i class="material-symbols-outlined">monitoring</i> Sensor Diagramme</a>
		</nav>

		<div class="content">
			<div class="cards">
				<!----------------------- SENSOR MANAGEMENT CARD TEMPLATE --------------------------------------------------------------------------------------->
				<template id="sensor-management-card-template">
					<div class="card sensorX">
						<h2 id="sensor_X_title"></h2>
						<form action="/set_sensor_name" class="sensor-name-container">
							<input type="hidden" name="sensorIndex" value="X">
							<input type="text" name="name" id="sensor_X_name" class="sensor-name-input" readonly placeholder="Sensor Name">
							<button type="button" class="icon-button" id="sensor_X_name_edit_btn" title="Namen bearbeiten">
								<i class="material-symbols-outlined">edit</i>
							</button>
							<button type="submit" class="icon-button" id="sensor_X_name_save_btn" title="Speichern" style="display:none">
								<i class="material-symbols-outlined">check</i>
							</button>
						</form>	
						<h4><i class="material-symbols-outlined">tune</i> SENSOR MODUS</h4>
						<form action="/set_sensor_mode" method="GET">
							<input type="hidden" name="sensorIndex" value="X">
							<input type="hidden" id="sensor_X_mode_selectedIndex">
							<div class="select-arrow">
								<select id="sensor_X_mode" name="mode" onchange="this.form.submit()">
									<option value="0">🟢 Normal</option>
									<option value="1">⛔ Deaktiviert</option>
									<option value="2">🔋 Laden</option>
									<option value="3">👁️ Nur Anzeige, kein Speichern</option>
									<option value="4">🔗 Sensor verbinden</option>
								</select>
							</div>
						</form>
						<br>
						<h4><i class="material-symbols-outlined">chat_bubble</i> ANZAHL NACHRICHTEN</h4>
						<p id="sensor_X_num_msg">%NUM_MESSAGES_X%</p>
						<br>					
						<h4><i class="material-symbols-outlined">update</i> SOFTWARE VERSION</h4>
						<p id="sensor_X_sw_version">%SENSOR_SW_VERSION_X%</p>
						<br>
						<h4><i class="material-symbols-outlined">pin</i> MAC</h4>
						<form action="/set_mac_sensor" class="mac-form">
							<input type="hidden" name="sensorIndex" value="X">
							<div class="mac-input-group">
								<input	class="input_sensor" required
										id="sensor_X_mac"
										name="mac"
										type="text"
										value="%MAC_SENSOR_X%"
										placeholder="00:00:00:00:00:00"
										pattern="[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}:[0-9A-Fa-f]{2}">
								<button class="mac-confirm-button" type="submit" title="MAC Adresse übernehmen"><i class="material-symbols-outlined">check</i></button>
							</div>
						</form>
						<br>
						<h4><i class="material-symbols-outlined">database</i> DATEN VERWALTEN</h4>
						<div class="sensor-data-buttons">
							<form action="/download_data" method="get" class="icon-button-form">
								<input type="hidden" name="sensorIndex" value="X">
								<button class="icon-button" type="submit" title="Daten herunterladen"><i class="material-symbols-outlined">download</i></button>
							</form>
							<!-- https://github.com/smford/esp32-asyncwebserver-fileupload-example/blob/master/example-01/example-01.ino -->
							<form action="/upload_data" method="POST" enctype="multipart/form-data" class="icon-button-form">
								<input type="hidden" name="sensorIndex" value="X">
								<button class="icon-button" type="button" title="Daten hochladen"><i class="material-symbols-outlined">upload</i></button>
								<input type="file" id="file_input_X" name="data" accept=".bin" style="display:none" onchange="this.form.submit()"/>
							</form>
							<form action="/remove_data" method="post" onsubmit="return confirm('Wirklich alle Daten löschen?');" class="icon-button-form">
								<input type="hidden" name="sensorIndex" value="X">
								<button class="icon-button icon-button-delete" type="submit" title="Daten löschen"><i class="material-symbols-outlined">delete</i></button>
							</form>
						</div>
					</div>
				</template>

				<!----------------------- SYSTEM INFO --------------------------------------------------------------------------------------->
				<div class="card general">
					<h2><i class="material-symbols-outlined">info</i> SYSTEM INFO</h2>
					<h4><i class="material-symbols-outlined">pin</i> EIGENE MAC</h4>
					<p id="indoor_station_mac">...</p>
					<br>
					<h4><i class="material-symbols-outlined">update</i> SOFTWARE VERSION</h4>
					<p id="indoor_station_sw_version">...</p>
					<br>
					<h4><i class="material-symbols-outlined">update</i> WEBPAGE VERSION</h4>
					<p id="webpage_version">...</p>
					<br>
					<h4><i class="material-symbols-outlined">storage</i> SPEICHERBELEGUNG</h4>
					<p id="indoor_station_memory_usage">...</p>
					<br>
					<h4><i class="material-symbols-outlined">schedule</i> SYSTEMZEIT</h4>
					<p id="indoor_station_time">...</p>
				</div>
			</div>			
		</div>
	</body>
	<script src="utils.js"></script>
	<script src="version.js"></script>
	<script src="system_management.js"></script>
</html>
